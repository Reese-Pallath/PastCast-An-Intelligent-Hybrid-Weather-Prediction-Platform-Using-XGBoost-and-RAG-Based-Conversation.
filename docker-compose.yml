services:
  pastcast:
    build:
      context: .
      args:
        REACT_APP_API_BASE_URL: ""   # Empty = relative URLs (same origin)
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - FLASK_ENV=production
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      - LOG_LEVEL=INFO
      - DB_PATH=/app/data/chat_memory.db
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
