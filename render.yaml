services:
  # ── Backend (Flask API) ──────────────────────────────────────────
  - type: web
    name: pastcast-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_ENV
        value: production
      - key: OPENWEATHER_API
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # ── Frontend (React static site) ────────────────────────────────
  - type: static
    name: pastcast-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_OPENWEATHER_API
        sync: false
      - key: REACT_APP_OPENWEATHER_API_KEY
        sync: false
      - key: REACT_APP_GEMINI
        sync: false
      - key: REACT_APP_API_BASE_URL
        sync: false
      - key: REACT_APP_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
